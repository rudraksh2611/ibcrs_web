<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#0066ff"/>
      <stop offset="1" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="hairg" x1="0" x2="1">
      <stop offset="0" stop-color="#6a3f2b"/>
      <stop offset="1" stop-color="#402218"/>
    </linearGradient>
  </defs>
  <style><![CDATA[
    .face { fill:#ffe6d6 }
    .shirt { fill:#5db8ff }
    .eye { fill:#222 }
    .hair { fill: url(#hairg) }
    .blink { animation: blink 4s linear infinite }
    @keyframes bob { 0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)} }
    @keyframes blink { 0%,90%,100%{height:12px} 93%{height:0px} }
  ]]></style>

  <rect width="400" height="400" rx="40" fill="url(#bg)" opacity="0.06"/>
  <g transform="translate(50,40)" class="bob" style="transform-origin:160px 160px; animation: bob 3.5s ease-in-out infinite;">
    <circle cx="160" cy="160" r="120" class="face"/>
    <!-- Hair -->
    <path d="M40 120 C20 60, 80 20, 160 20 C240 20, 300 60, 280 120 C260 60, 100 60, 40 120 Z" class="hair"/>
    <!-- Eyes (rectangles animate to simulate blink using SMIL fallback) -->
    <g transform="translate(60,90)">
      <rect x="40" y="40" width="18" height="12" class="eye" ry="6">
        <animate attributeName="height" dur="4s" values="12;0;12" keyTimes="0;0.93;1" repeatCount="indefinite"/>
      </rect>
      <rect x="110" y="40" width="18" height="12" class="eye" ry="6">
        <animate attributeName="height" dur="4s" values="12;0;12" keyTimes="0;0.93;1" repeatCount="indefinite"/>
      </rect>
      <path d="M48 70 Q80 92 112 70" stroke="#c75" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Shirt -->
    <g transform="translate(60,220)">
      <rect x="0" y="0" width="200" height="120" rx="24" class="shirt"/>
      <circle cx="100" cy="20" r="6" fill="#fff" opacity="0.2"/>
    </g>
  </g>
</svg>
