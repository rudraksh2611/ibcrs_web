<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" aria-hidden="true">
  <defs>
    <linearGradient id="bg2" x1="0" x2="1">
      <stop offset="0" stop-color="#005ceb"/>
      <stop offset="1" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="hairm" x1="0" x2="1">
      <stop offset="0" stop-color="#2c3e50"/>
      <stop offset="1" stop-color="#16202a"/>
    </linearGradient>
  </defs>
  <style><![CDATA[
    .face { fill:#fff0e6 }
    .shirt { fill:#2e9cff }
    .eye { fill:#111 }
    .hair { fill: url(#hairm) }
    @keyframes bob2 { 0%{transform:translateY(0)}50%{transform:translateY(-5px)}100%{transform:translateY(0)} }
  ]]></style>

  <rect width="400" height="400" rx="40" fill="url(#bg2)" opacity="0.06"/>
  <g transform="translate(50,40)" style="transform-origin:160px 160px; animation: bob2 3.8s ease-in-out infinite;">
    <circle cx="160" cy="160" r="120" class="face"/>
    <!-- Hair -->
    <path d="M40 120 C60 70, 120 30, 200 30 C280 30, 330 70, 300 120 C260 70, 100 70, 40 120 Z" class="hair"/>
    <!-- Eyes with SMIL blink -->
    <g transform="translate(60,90)">
      <rect x="40" y="40" width="18" height="12" class="eye" ry="6">
        <animate attributeName="height" dur="4s" values="12;0;12" keyTimes="0;0.92;1" repeatCount="indefinite"/>
      </rect>
      <rect x="110" y="40" width="18" height="12" class="eye" ry="6">
        <animate attributeName="height" dur="4s" values="12;0;12" keyTimes="0;0.92;1" repeatCount="indefinite"/>
      </rect>
      <path d="M44 72 Q80 96 116 72" stroke="#b05" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Shirt -->
    <g transform="translate(60,220)">
      <rect x="0" y="0" width="200" height="120" rx="24" class="shirt"/>
      <rect x="86" y="16" width="28" height="8" rx="4" fill="#ffffff" opacity="0.14"/>
    </g>
  </g>
</svg>
