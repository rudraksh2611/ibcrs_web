<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <radialGradient id="pulseGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="#071221"/>

  <!-- Outer detection rings (scanning concept) -->
  <circle cx="100" cy="85" r="75" fill="none" stroke="url(#mainGradient)" stroke-width="1" opacity="0.25"/>
  <circle cx="100" cy="85" r="55" fill="none" stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.35"/>
  <circle cx="100" cy="85" r="40" fill="none" stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.45"/>

  <!-- Central microscope element -->
  <g filter="url(#glow)">
    <!-- Objective lens -->
    <circle cx="100" cy="85" r="22" fill="none" stroke="url(#mainGradient)" stroke-width="2.5"/>
    <!-- Inner lens highlight -->
    <circle cx="100" cy="85" r="18" fill="url(#pulseGradient)" opacity="0.5"/>
    <!-- Lens detail -->
    <circle cx="100" cy="85" r="12" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Detection crosshair -->
  <g stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <line x1="100" y1="65" x2="100" y2="50"/>
    <line x1="100" y1="105" x2="100" y2="120"/>
    <line x1="80" y1="85" x2="65" y2="85"/>
    <line x1="120" y1="85" x2="135" y2="85"/>
  </g>

  <!-- AI Neural Network nodes -->
  <g>
    <!-- Top layer nodes -->
    <circle cx="65" cy="125" r="4" fill="#0066ff" filter="url(#glow)"/>
    <circle cx="100" cy="125" r="4" fill="#0066ff" filter="url(#glow)"/>
    <circle cx="135" cy="125" r="4" fill="#0066ff" filter="url(#glow)"/>
    
    <!-- Bottom layer nodes -->
    <circle cx="80" cy="155" r="4" fill="#00d4ff" filter="url(#glow)"/>
    <circle cx="100" cy="155" r="4" fill="#00d4ff" filter="url(#glow)"/>
    <circle cx="120" cy="155" r="4" fill="#00d4ff" filter="url(#glow)"/>
    
    <!-- Neural connections -->
    <g stroke="url(#mainGradient)" stroke-width="1.2" opacity="0.6">
      <line x1="65" y1="125" x2="80" y2="155"/>
      <line x1="65" y1="125" x2="100" y2="155"/>
      <line x1="100" y1="125" x2="100" y2="155"/>
      <line x1="135" y1="125" x2="120" y2="155"/>
      <line x1="135" y1="125" x2="100" y2="155"/>
      <line x1="65" y1="125" x2="100" y2="125"/>
      <line x1="100" y1="125" x2="135" y2="125"/>
    </g>
  </g>

  <!-- Recognition success indicator (check mark) -->
  <g stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M 148 55 L 155 62 L 165 48"/>
  </g>
</svg>
