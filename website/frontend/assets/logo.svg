<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#grad1)" stroke-width="2"/>
  
  <!-- Brain-like shape representing AI -->
  <g id="brain" transform="translate(100, 100)">
    <!-- Left hemisphere -->
    <circle cx="-30" cy="-20" r="15" fill="url(#grad1)" opacity="0.8"/>
    <circle cx="-35" cy="0" r="18" fill="url(#grad1)" opacity="0.7"/>
    <circle cx="-25" cy="25" r="14" fill="url(#grad1)" opacity="0.8"/>
    
    <!-- Right hemisphere -->
    <circle cx="30" cy="-20" r="15" fill="url(#grad1)" opacity="0.8"/>
    <circle cx="35" cy="0" r="18" fill="url(#grad1)" opacity="0.7"/>
    <circle cx="25" cy="25" r="14" fill="url(#grad1)" opacity="0.8"/>
    
    <!-- Center connecting parts -->
    <circle cx="0" cy="-15" r="12" fill="url(#grad1)" opacity="0.9"/>
    <circle cx="0" cy="20" r="10" fill="url(#grad1)" opacity="0.9"/>
    
    <!-- Network lines -->
    <line x1="-30" y1="-20" x2="0" y2="-15" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="-20" x2="0" y2="-15" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    <line x1="-35" y1="0" x2="0" y2="20" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    <line x1="35" y1="0" x2="0" y2="20" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0066ff">IBCRS</text>
</svg>
