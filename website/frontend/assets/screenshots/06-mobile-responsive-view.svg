<svg viewBox="0 0 600 850" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone Frame -->
  <rect x="25" y="20" width="550" height="810" fill="#1a1f2e" stroke="#0066ff" stroke-width="3" rx="30"/>
  
  <!-- Notch -->
  <rect x="240" y="20" width="120" height="30" fill="#0a0e1a" rx="0"/>
  
  <!-- Screen -->
  <rect x="35" y="50" width="530" height="770" fill="#0f1419" rx="20"/>
  
  <!-- Navbar -->
  <rect x="35" y="50" width="530" height="50" fill="#0a0e1a" stroke="#0066ff" stroke-width="1"/>
  <text x="55" y="75" font-size="14" fill="#00d4ff" font-weight="bold">🧬 IBCRS</text>
  <text x="95" y="75" font-size="9" fill="#a0aec0">BioTech</text>
  <text x="480" y="75" font-size="16" fill="#00d4ff">⚙️</text>
  
  <!-- Title Section -->
  <text x="300" y="120" font-size="13" fill="#00d4ff" font-weight="bold" text-anchor="middle">Real-time Detection</text>
  
  <!-- Video Feed (Mobile Size) -->
  <rect x="50" y="135" width="500" height="280" fill="#1a1f2e" stroke="#0066ff" stroke-width="2" rx="8"/>
  
  <!-- Video Content -->
  <defs>
    <linearGradient id="mobileVideoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a6f8f;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#1a3f5f;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect x="55" y="140" width="490" height="270" fill="url(#mobileVideoGradient)" rx="6"/>
  
  <!-- Detected Object Box -->
  <rect x="120" y="200" width="100" height="80" fill="none" stroke="#10b981" stroke-width="2" rx="3"/>
  <text x="170" y="185" font-size="10" fill="#10b981" font-weight="bold" text-anchor="middle">Camera</text>
  <text x="170" y="300" font-size="9" fill="#10b981" text-anchor="middle">(0.95)</text>
  
  <!-- Control Buttons (Compact) -->
  <rect x="50" y="430" width="240" height="40" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="1" rx="6"/>
  <text x="170" y="458" font-size="11" fill="#10b981" text-anchor="middle" font-weight="bold">▶ START</text>
  
  <rect x="310" y="430" width="240" height="40" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1" rx="6"/>
  <text x="430" y="458" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">⏹ STOP</text>
  
  <!-- Stats Bar -->
  <rect x="50" y="485" width="500" height="50" fill="#1a1f2e" stroke="#0066ff" stroke-width="1" rx="6"/>
  <text x="70" y="505" font-size="9" fill="#a0aec0">FPS:</text>
  <text x="100" y="505" font-size="10" fill="#10b981" font-weight="bold">30</text>
  
  <text x="170" y="505" font-size="9" fill="#a0aec0">Inference:</text>
  <text x="245" y="505" font-size="10" fill="#10b981" font-weight="bold">25ms</text>
  
  <text x="330" y="505" font-size="9" fill="#a0aec0">CPU:</text>
  <text x="360" y="505" font-size="10" fill="#10b981" font-weight="bold">35%</text>
  
  <text x="430" y="505" font-size="9" fill="#a0aec0">Mem:</text>
  <text x="465" y="505" font-size="10" fill="#10b981" font-weight="bold">42%</text>
  
  <!-- Detected Components Title -->
  <text x="70" y="560" font-size="11" fill="#00d4ff" font-weight="bold">Detected Components</text>
  
  <!-- Component Buttons (Vertical Stack) -->
  <!-- Camera -->
  <rect x="50" y="575" width="500" height="45" fill="rgba(16,185,129,0.1)" stroke="#10b981" stroke-width="1" rx="6"/>
  <text x="70" y="598" font-size="11" fill="#10b981" font-weight="bold">📷 Camera</text>
  <text x="70" y="612" font-size="8" fill="#a0aec0">Confidence: 0.95 | Count: 3</text>
  <text x="520" y="598" font-size="12" fill="#00d4ff" text-anchor="end">›</text>
  
  <!-- DroneRx -->
  <rect x="50" y="632" width="500" height="45" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1" rx="6"/>
  <text x="70" y="655" font-size="11" fill="#f59e0b" font-weight="bold">🛰️ Drone Receiver</text>
  <text x="70" y="669" font-size="8" fill="#a0aec0">Confidence: 0.92 | Count: 2</text>
  <text x="520" y="655" font-size="12" fill="#00d4ff" text-anchor="end">›</text>
  
  <!-- PIR -->
  <rect x="50" y="689" width="500" height="45" fill="rgba(6,182,212,0.1)" stroke="#06b6d4" stroke-width="1" rx="6"/>
  <text x="70" y="712" font-size="11" fill="#06b6d4" font-weight="bold">💡 PIR Sensor</text>
  <text x="70" y="726" font-size="8" fill="#a0aec0">Confidence: 0.88 | Count: 1</text>
  <text x="520" y="712" font-size="12" fill="#00d4ff" text-anchor="end">›</text>
  
  <!-- Footer -->
  <rect x="35" y="760" width="530" height="60" fill="#0a0e1a" rx="10"/>
  <text x="300" y="795" font-size="8" fill="#666" text-anchor="middle">© 2025 IBCRS. All rights reserved.</text>
</svg>
