<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#0f1419"/>
  
  <!-- Header/Navbar -->
  <rect width="800" height="60" fill="#1a1f2e" stroke="#0066ff" stroke-width="1"/>
  <text x="20" y="40" font-size="24" fill="#0066ff" font-weight="bold">🧠 IBCRS</text>
  <text x="300" y="40" font-size="16" fill="#a0aec0">Intelligent BioTech Component Recognition System</text>
  
  <!-- Video Feed Area -->
  <rect x="20" y="80" width="500" height="400" fill="#1a1f2e" stroke="#0066ff" stroke-width="2" rx="8"/>
  <text x="270" y="320" font-size="16" fill="#a0aec0" text-anchor="middle">📹 Live Video Stream</text>
  
  <!-- Detection Badges -->
  <rect x="540" y="80" width="240" height="140" fill="#1a1f2e" stroke="#0066ff" stroke-width="1" rx="8"/>
  <text x="660" y="100" font-size="14" fill="#00d4ff" font-weight="bold" text-anchor="middle">Detected Components</text>
  
  <!-- Badge 1 -->
  <rect x="550" y="115" width="220" height="35" fill="rgba(0,102,255,0.2)" rx="5"/>
  <text x="565" y="135" font-size="12" fill="#0066ff">📷 Camera (Cam)</text>
  <text x="735" y="135" font-size="12" fill="#10b981" text-anchor="end">Count: 1</text>
  
  <!-- Badge 2 -->
  <rect x="550" y="155" width="220" height="35" fill="rgba(0,102,255,0.2)" rx="5"/>
  <text x="565" y="175" font-size="12" fill="#0066ff">🛰️ Drone Receiver</text>
  <text x="735" y="175" font-size="12" fill="#10b981" text-anchor="end">Count: 2</text>
  
  <!-- Stats Panel -->
  <rect x="540" y="230" width="240" height="150" fill="#1a1f2e" stroke="#0066ff" stroke-width="1" rx="8"/>
  <text x="660" y="250" font-size="14" fill="#00d4ff" font-weight="bold" text-anchor="middle">Performance Stats</text>
  
  <text x="555" y="275" font-size="11" fill="#a0aec0">FPS: 30</text>
  <text x="660" y="275" font-size="11" fill="#a0aec0">Inference: 25ms</text>
  
  <text x="555" y="300" font-size="11" fill="#a0aec0">CPU: 35%</text>
  <text x="660" y="300" font-size="11" fill="#a0aec0">Memory: 42%</text>
  
  <text x="555" y="325" font-size="11" fill="#a0aec0">Detections: 3</text>
  
  <!-- Buttons -->
  <rect x="540" y="395" width="110" height="40" fill="rgba(0,102,255,0.3)" stroke="#0066ff" stroke-width="1" rx="5"/>
  <text x="595" y="420" font-size="12" fill="#0066ff" text-anchor="middle" font-weight="bold">▶ START</text>
  
  <rect x="660" y="395" width="110" height="40" fill="rgba(239,68,68,0.3)" stroke="#ef4444" stroke-width="1" rx="5"/>
  <text x="715" y="420" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="bold">⏹ STOP</text>
  
  <!-- Learn More Buttons Section -->
  <rect x="20" y="495" width="760" height="80" fill="#1a1f2e" stroke="#0066ff" stroke-width="1" rx="8"/>
  <text x="40" y="515" font-size="12" fill="#00d4ff" font-weight="bold">📚 Learn More About Detected Components</text>
  
  <!-- Button 1 -->
  <rect x="40" y="530" width="160" height="35" fill="linear-gradient(135deg, #0066ff, #00d4ff)" rx="5"/>
  <text x="120" y="553" font-size="11" fill="white" text-anchor="middle" font-weight="bold">📷 Camera Info & Video</text>
  
  <!-- Button 2 -->
  <rect x="220" y="530" width="180" height="35" fill="linear-gradient(135deg, #0066ff, #00d4ff)" rx="5"/>
  <text x="310" y="553" font-size="11" fill="white" text-anchor="middle" font-weight="bold">🛰️ Drone Receiver Info</text>
  
  <!-- Footer -->
  <text x="400" y="590" font-size="10" fill="#a0aec0" text-anchor="middle">© 2026 IBCRS - Intelligent BioTech Component Recognition System</text>
</svg>
