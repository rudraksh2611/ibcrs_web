<svg viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="650" fill="#0f1419"/>
  
  <!-- Navbar -->
  <rect x="0" y="0" width="900" height="55" fill="#0a0e1a" stroke="#0066ff" stroke-width="1"/>
  <text x="20" y="32" font-size="18" fill="#00d4ff" font-weight="bold">🧬 IBCRS</text>
  <text x="65" y="32" font-size="14" fill="#a0aec0">Intelligent BioTech Component Recognition System</text>
  
  <!-- Title -->
  <text x="450" y="90" font-size="16" fill="#00d4ff" font-weight="bold" text-anchor="middle">Real-time Multi-Component Detection</text>
  
  <!-- Video Feed Container -->
  <rect x="50" y="110" width="800" height="450" fill="#1a1f2e" stroke="#0066ff" stroke-width="2" rx="8"/>
  
  <!-- Video Feed Background -->
  <rect x="60" y="120" width="780" height="430" fill="#2a2f3e" rx="6"/>
  
  <!-- Simulated Video Feed with Objects -->
  <!-- Background gradient effect -->
  <defs>
    <linearGradient id="videoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a6f8f;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1a3f5f;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect x="60" y="120" width="780" height="430" fill="url(#videoGradient)" rx="6"/>
  
  <!-- Object 1: Camera Detection -->
  <rect x="100" y="180" width="120" height="90" fill="none" stroke="#10b981" stroke-width="3" rx="4"/>
  <text x="160" y="160" font-size="11" fill="#10b981" font-weight="bold" text-anchor="middle">Camera (0.95)</text>
  <text x="160" y="280" font-size="10" fill="#10b981" text-anchor="middle">✓ Detected</text>
  
  <!-- Object 2: DroneRx Detection -->
  <rect x="280" y="200" width="100" height="120" fill="none" stroke="#f59e0b" stroke-width="3" rx="4"/>
  <text x="330" y="180" font-size="11" fill="#f59e0b" font-weight="bold" text-anchor="middle">DroneRx (0.92)</text>
  <text x="330" y="340" font-size="10" fill="#f59e0b" text-anchor="middle">✓ Detected</text>
  
  <!-- Object 3: PIR Sensor Detection -->
  <rect x="500" y="150" width="110" height="100" fill="none" stroke="#06b6d4" stroke-width="3" rx="4"/>
  <text x="555" y="130" font-size="11" fill="#06b6d4" font-weight="bold" text-anchor="middle">PIR Sensor (0.88)</text>
  <text x="555" y="270" font-size="10" fill="#06b6d4" text-anchor="middle">✓ Detected</text>
  
  <!-- Object 4: Sonar Sensor Detection -->
  <rect x="680" y="280" width="95" height="110" fill="none" stroke="#8b5cf6" stroke-width="3" rx="4"/>
  <text x="727" y="260" font-size="11" fill="#8b5cf6" font-weight="bold" text-anchor="middle">Sonar (0.87)</text>
  <text x="727" y="410" font-size="10" fill="#8b5cf6" text-anchor="middle">✓ Detected</text>
  
  <!-- Object 5: Camera Detection (second instance) -->
  <rect x="120" y="320" width="100" height="110" fill="none" stroke="#10b981" stroke-width="3" rx="4"/>
  <text x="170" y="300" font-size="11" fill="#10b981" font-weight="bold" text-anchor="middle">Camera (0.91)</text>
  <text x="170" y="450" font-size="10" fill="#10b981" text-anchor="middle">✓ Detected</text>
  
  <!-- Detection Status Bar -->
  <rect x="50" y="575" width="800" height="50" fill="#1a1f2e" stroke="#0066ff" stroke-width="2" rx="8"/>
  
  <!-- Stats -->
  <text x="70" y="595" font-size="11" fill="#a0aec0">Total Detections:</text>
  <text x="180" y="595" font-size="12" fill="#10b981" font-weight="bold">5</text>
  
  <text x="250" y="595" font-size="11" fill="#a0aec0">Unique Classes:</text>
  <text x="365" y="595" font-size="12" fill="#00d4ff" font-weight="bold">4</text>
  
  <text x="430" y="595" font-size="11" fill="#a0aec0">Confidence (Avg):</text>
  <text x="570" y="595" font-size="12" fill="#f59e0b" font-weight="bold">0.91</text>
  
  <text x="640" y="595" font-size="11" fill="#a0aec0">Inference:</text>
  <text x="720" y="595" font-size="12" fill="#10b981" font-weight="bold">25ms</text>
  
  <!-- Detected Components Buttons -->
  <text x="70" y="630" font-size="12" fill="#00d4ff" font-weight="bold">Detected Components:</text>
  
  <!-- Camera Button -->
  <rect x="260" y="612" width="90" height="28" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="1" rx="5"/>
  <text x="305" y="632" font-size="11" fill="#10b981" text-anchor="middle">📷 Camera</text>
  
  <!-- DroneRx Button -->
  <rect x="365" y="612" width="110" height="28" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1" rx="5"/>
  <text x="420" y="632" font-size="11" fill="#f59e0b" text-anchor="middle">🛰️ DroneRx</text>
  
  <!-- PIR Button -->
  <rect x="490" y="612" width="95" height="28" fill="rgba(6,182,212,0.2)" stroke="#06b6d4" stroke-width="1" rx="5"/>
  <text x="537" y="632" font-size="11" fill="#06b6d4" text-anchor="middle">💡 PIR</text>
  
  <!-- Sonar Button -->
  <rect x="600" y="612" width="105" height="28" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="1" rx="5"/>
  <text x="652" y="632" font-size="11" fill="#8b5cf6" text-anchor="middle">📡 Sonar</text>
</svg>
