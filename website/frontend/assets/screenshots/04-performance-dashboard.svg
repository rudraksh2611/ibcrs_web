<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f1419"/>
  
  <!-- Title -->
  <text x="400" y="35" font-size="22" fill="#00d4ff" font-weight="bold" text-anchor="middle">Performance & Detection Statistics</text>
  
  <!-- Left Panel - Performance Metrics -->
  <rect x="20" y="60" width="360" height="410" fill="#1a1f2e" stroke="#0066ff" stroke-width="2" rx="10"/>
  <text x="200" y="85" font-size="14" fill="#00d4ff" font-weight="bold" text-anchor="middle">Real-time Metrics</text>
  
  <!-- FPS Counter -->
  <rect x="40" y="105" width="320" height="60" fill="rgba(0,102,255,0.1)" stroke="#0066ff" stroke-width="1" rx="6"/>
  <text x="55" y="125" font-size="12" fill="#a0aec0">Frames Per Second</text>
  <text x="200" y="155" font-size="28" fill="#10b981" text-anchor="middle" font-weight="bold">30 FPS</text>
  
  <!-- Inference Time -->
  <rect x="40" y="180" width="320" height="60" fill="rgba(0,102,255,0.1)" stroke="#0066ff" stroke-width="1" rx="6"/>
  <text x="55" y="200" font-size="12" fill="#a0aec0">Model Inference Time</text>
  <text x="200" y="230" font-size="28" fill="#10b981" text-anchor="middle" font-weight="bold">25 ms</text>
  
  <!-- CPU Usage -->
  <rect x="40" y="255" width="320" height="60" fill="rgba(0,102,255,0.1)" stroke="#0066ff" stroke-width="1" rx="6"/>
  <text x="55" y="275" font-size="12" fill="#a0aec0">CPU Usage</text>
  <rect x="55" y="290" width="280" height="15" fill="rgba(100,100,100,0.3)" rx="7"/>
  <rect x="55" y="290" width="112" height="15" fill="#00d4ff" rx="7"/>
  <text x="200" y="310" font-size="12" fill="#a0aec0" text-anchor="middle">35%</text>
  
  <!-- Memory Usage -->
  <rect x="40" y="330" width="320" height="60" fill="rgba(0,102,255,0.1)" stroke="#0066ff" stroke-width="1" rx="6"/>
  <text x="55" y="350" font-size="12" fill="#a0aec0">Memory Usage</text>
  <rect x="55" y="365" width="280" height="15" fill="rgba(100,100,100,0.3)" rx="7"/>
  <rect x="55" y="365" width="117" height="15" fill="#00d4ff" rx="7"/>
  <text x="200" y="385" font-size="12" fill="#a0aec0" text-anchor="middle">42%</text>
  
  <!-- Right Panel - Detection Statistics -->
  <rect x="420" y="60" width="360" height="410" fill="#1a1f2e" stroke="#0066ff" stroke-width="2" rx="10"/>
  <text x="600" y="85" font-size="14" fill="#00d4ff" font-weight="bold" text-anchor="middle">Detection Statistics</text>
  
  <!-- Total Detections -->
  <rect x="440" y="105" width="320" height="70" fill="rgba(16,185,129,0.1)" stroke="#10b981" stroke-width="1" rx="6"/>
  <text x="455" y="125" font-size="12" fill="#a0aec0">Total Detections</text>
  <text x="600" y="160" font-size="32" fill="#10b981" text-anchor="middle" font-weight="bold">125</text>
  
  <!-- Detected Classes -->
  <text x="455" y="200" font-size="12" fill="#00d4ff" font-weight="bold">Detected Components:</text>
  
  <!-- Class 1 -->
  <rect x="440" y="210" width="320" height="35" fill="rgba(0,102,255,0.1)" stroke="#0066ff" stroke-width="1" rx="5"/>
  <text x="455" y="230" font-size="11" fill="#a0aec0">📷 Camera (Cam)</text>
  <rect x="650" y="215" width="95" height="25" fill="rgba(0,102,255,0.2)" stroke="#0066ff" stroke-width="1" rx="4"/>
  <text x="697" y="233" font-size="11" fill="#0066ff" text-anchor="middle" font-weight="bold">45 detected</text>
  
  <!-- Class 2 -->
  <rect x="440" y="255" width="320" height="35" fill="rgba(0,102,255,0.1)" stroke="#0066ff" stroke-width="1" rx="5"/>
  <text x="455" y="275" font-size="11" fill="#a0aec0">🛰️ Drone Receiver (DroneRx)</text>
  <rect x="650" y="260" width="95" height="25" fill="rgba(0,102,255,0.2)" stroke="#0066ff" stroke-width="1" rx="4"/>
  <text x="697" y="278" font-size="11" fill="#0066ff" text-anchor="middle" font-weight="bold">32 detected</text>
  
  <!-- Class 3 -->
  <rect x="440" y="300" width="320" height="35" fill="rgba(0,102,255,0.1)" stroke="#0066ff" stroke-width="1" rx="5"/>
  <text x="455" y="320" font-size="11" fill="#a0aec0">💡 PIR Sensor</text>
  <rect x="650" y="305" width="95" height="25" fill="rgba(0,102,255,0.2)" stroke="#0066ff" stroke-width="1" rx="4"/>
  <text x="697" y="323" font-size="11" fill="#0066ff" text-anchor="middle" font-weight="bold">28 detected</text>
  
  <!-- Class 4 -->
  <rect x="440" y="345" width="320" height="35" fill="rgba(0,102,255,0.1)" stroke="#0066ff" stroke-width="1" rx="5"/>
  <text x="455" y="365" font-size="11" fill="#a0aec0">📡 Sonar Sensor</text>
  <rect x="650" y="350" width="95" height="25" fill="rgba(0,102,255,0.2)" stroke="#0066ff" stroke-width="1" rx="4"/>
  <text x="697" y="368" font-size="11" fill="#0066ff" text-anchor="middle" font-weight="bold">20 detected</text>
</svg>
