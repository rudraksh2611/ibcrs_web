<svg viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="700" fill="#0f1419"/>
  
  <!-- Navbar -->
  <rect width="800" height="50" fill="#1a1f2e" stroke="#0066ff" stroke-width="1"/>
  <text x="20" y="33" font-size="18" fill="#0066ff" font-weight="bold">🧠 IBCRS</text>
  <rect x="700" y="12" width="70" height="26" fill="rgba(0,102,255,0.2)" stroke="#0066ff" stroke-width="1" rx="4"/>
  <text x="735" y="31" font-size="11" fill="#0066ff" text-anchor="middle" font-weight="bold">← Back</text>
  
  <!-- Page Header -->
  <rect x="20" y="70" width="760" height="80" fill="linear-gradient(135deg, rgba(0,102,255,0.15), rgba(0,212,255,0.1))" stroke="#0066ff" stroke-width="2" rx="10"/>
  <text x="400" y="95" font-size="28" fill="#0066ff" text-anchor="middle" font-weight="bold">📷 Camera Detection</text>
  <text x="400" y="120" font-size="12" fill="#a0aec0" text-anchor="middle">Optical Imaging & Security Equipment Recognition</text>
  
  <!-- Introduction Section -->
  <rect x="20" y="170" width="760" height="90" fill="#1a1f2e" stroke="#0066ff" stroke-width="1" rx="8"/>
  <text x="40" y="190" font-size="13" fill="#00d4ff" font-weight="bold">ℹ️ Introduction</text>
  <text x="40" y="210" font-size="11" fill="#b0b8c0">Camera detection module for identifying optical cameras and lens-based imaging devices.</text>
  <text x="40" y="227" font-size="11" fill="#b0b8c0">Essential for security assessments and identifying monitoring devices in environments.</text>
  <text x="40" y="244" font-size="11" fill="#b0b8c0">Works with CCTV cameras, webcams, and surveillance equipment.</text>
  
  <!-- Advantages Section -->
  <rect x="20" y="280" width="760" height="100" fill="#1a1f2e" stroke="#0066ff" stroke-width="1" rx="8"/>
  <text x="40" y="300" font-size="13" fill="#00d4ff" font-weight="bold">✓ Advantages</text>
  <rect x="40" y="312" width="720" height="62" fill="rgba(16,185,129,0.1)" stroke="#10b981" stroke-width="1" rx="5"/>
  <text x="55" y="328" font-size="11" fill="#b0b8c0">✓ High accuracy detection • Works in various angles • Identifies hidden cameras</text>
  <text x="55" y="345" font-size="11" fill="#b0b8c0">✓ Useful for security audits • Fast real-time detection capability</text>
  <text x="55" y="362" font-size="11" fill="#b0b8c0">✓ Asset tracking and equipment inventory management</text>
  
  <!-- Disadvantages Section -->
  <rect x="20" y="400" width="760" height="90" fill="#1a1f2e" stroke="#0066ff" stroke-width="1" rx="8"/>
  <text x="40" y="420" font-size="13" fill="#00d4ff" font-weight="bold">⚠ Disadvantages</text>
  <rect x="40" y="432" width="720" height="52" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1" rx="5"/>
  <text x="55" y="448" font-size="11" fill="#b0b8c0">⚠ May confuse similar lens-based objects • Small cameras harder to detect</text>
  <text x="55" y="465" font-size="11" fill="#b0b8c0">⚠ Performance varies with image resolution • Lighting conditions affect accuracy</text>
  
  <!-- Tutorial Video Section -->
  <rect x="20" y="510" width="760" height="100" fill="#1a1f2e" stroke="#0066ff" stroke-width="1" rx="8"/>
  <text x="40" y="530" font-size="13" fill="#00d4ff" font-weight="bold">🎬 Tutorial Video</text>
  <rect x="40" y="545" width="720" height="50" fill="rgba(0,102,255,0.2)" stroke="#0066ff" stroke-width="2" rx="5"/>
  <text x="400" y="572" font-size="12" fill="#00d4ff" text-anchor="middle" font-weight="bold">▶ Play Educational Video</text>
  
  <!-- Footer -->
  <text x="400" y="690" font-size="10" fill="#a0aec0" text-anchor="middle">© 2026 IBCRS - Intelligent BioTech Component Recognition System</text>
</svg>
