version: '3.8'

services:
  ibcrs:
    build: .
    container_name: ibcrs-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
    volumes:
      # Mount model files
      - ./models:/app/models
      - ./output:/app/output
    restart: unless-stopped
    # Uncomment to enable GPU support (requires nvidia-docker)
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
